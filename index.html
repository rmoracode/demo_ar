<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AJE Puntos - WebAR Fix</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* Forzar que el HTML y el Body no bloqueen la cámara */
        html, body {
            margin: 0px;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #login-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999; /* Asegurar que esté por encima de la cámara */
            background: white;
            padding: 25px;
            border-radius: 15px;
            font-family: Arial, sans-serif;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 80%;
            max-width: 280px;
        }
        #login-ui input {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
        }
        #login-ui button {
            background-color: #E30613;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="login-ui">
        <h3 style="margin: 0; color: #333;">Puntos AJE</h3>
        <p style="font-size: 12px; color: #666; margin: 5px 0;">Ingresa para activar la cámara</p>
        <input type="number" id="dpi-input" placeholder="Código de prueba: 12345">
        <button onclick="activarExperiencia()">Iniciar Escáner</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" vr-mode-ui="enabled: false">
        
        <a-marker preset="hiro" id="marcador">
            <a-entity id="ar-content" position="0 0 0" visible="false">
                <a-plane position="0 0.5 0" rotation="-90 0 0" width="2" height="1.2" color="#111" material="opacity: 0.9"></a-plane>
                <a-text id="txt-saludo" value="" position="-0.8 0.9 0.1" rotation="-90 0 0" color="#FFF" width="3.5"></a-text>
                <a-text id="txt-puntos" value="" position="-0.8 0.5 0.1" rotation="-90 0 0" color="#FFD700" width="5"></a-text>
                <a-text id="txt-canje" value="" position="-0.8 0.1 0.1" rotation="-90 0 0" color="#FFF" width="2.5"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const dbClientes = {
            "12345": { nombre: "Juan Pérez", puntos: "150 PTS", premio: "1 Pack de Volt" }
        };

        function activarExperiencia() {
            const idInput = document.getElementById('dpi-input').value;
            
            if (dbClientes[idInput]) {
                const cliente = dbClientes[idInput];
                
                // Asignar los valores a los textos 3D
                document.getElementById('txt-saludo').setAttribute('value', `¡Hola, ${cliente.nombre}!`);
                document.getElementById('txt-puntos').setAttribute('value', `Puntos: ${cliente.puntos}`);
                document.getElementById('txt-canje').setAttribute('value', `Canje: ${cliente.premio}`);
                
                // Hacer visible el componente de AR
                document.getElementById('ar-content').setAttribute('visible', 'true');
                
                // Ocultar la UI de login
                document.getElementById('login-ui').style.display = 'none';
                
                // TRUCO EXPERTO: Forzar al navegador a recalcular el tamaño de la cámara de AR.js
                setTimeout(() => {
                    window.dispatchEvent(new Event('resize'));
                }, 500);

            } else {
                alert("Por favor usa el código de prueba: 12345");
            }
        }
    </script>
</body>
</html>
